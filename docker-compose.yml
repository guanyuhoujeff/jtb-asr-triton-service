services:
  triton-server:
    build: .
    container_name: asr_triton_server
    image: asr-triton-service:latest
    shm_size: 4g
    ports:
      - "${HTTP_PORT:-8000}:8000"
      - "${GRPC_PORT:-8001}:8001"
      - "${METRICS_PORT:-8002}:8002"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
